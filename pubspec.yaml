name: flutter_xprinter_sdk
description: Flutter plugin for XPrinter thermal receipt printers. Cyrillic-safe text, Floyd-Steinberg image dithering, BLE / Classic Bluetooth / USB / TCP transports.
version: 0.1.0
homepage: https://github.com/Lazizbek97/flutter_xprinter_sdk
repository: https://github.com/Lazizbek97/flutter_xprinter_sdk
issue_tracker: https://github.com/Lazizbek97/flutter_xprinter_sdk/issues
topics:
  - printer
  - thermal
  - esc-pos
  - xprinter
  - bluetooth

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  image: ^4.8.0
  plugin_platform_interface: ^2.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

executables:
  setup: setup

flutter:
  plugin:
    platforms:
      android:
        package: dev.lazizbekfayziev.flutter_xprinter_sdk
        pluginClass: XprinterSdkPlugin
      ios:
        pluginClass: XprinterSdkPlugin
