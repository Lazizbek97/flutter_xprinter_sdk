name: flutter_xprinter_sdk_example
description: Demo app for the flutter_xprinter_sdk plugin — connect to a thermal printer and print a sample receipt.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_xprinter_sdk:
    path: ../
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/dash-logo.png
    - assets/dash.jpg
